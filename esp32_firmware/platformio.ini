[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21
    emelianov/modbus-esp8266@^4.1

; ===== WiFi 配置 =====
; 复制到 include/wifi_credentials.h 并填入实际值
build_flags =
    -D WIFI_SSID=\"${sysenv.WIFI_SSID}\"
    -D WIFI_PASSWORD=\"${sysenv.WIFI_PASSWORD}\"
    -D MQTT_SERVER=\"${sysenv.MQTT_SERVER}\"
    -D DEVICE_ID=\"rtu-001\"
