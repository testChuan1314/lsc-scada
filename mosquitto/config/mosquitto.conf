# ============================================
# LSC SCADA - Mosquitto MQTT 配置
# ============================================

# --- 监听端口 ---
listener 1883
protocol mqtt

# --- 允许匿名连接（内网 SCADA 场景，后续可改为密码认证） ---
allow_anonymous true

# --- 持久化 ---
persistence true
persistence_location /mosquitto/data

# --- 日志 ---
log_dest file /mosquitto/log/mosquitto.log
log_type all
